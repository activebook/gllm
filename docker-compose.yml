services:
  # gllm: Remote image, CLI access (interactive)
  gllm:
    # Build using the Dockerfile in the current directory(for local)
    # build: .
    
    # Local image
    #image: gllm:latest

    # Downloaded remote package
    image: ghcr.io/activebook/gllm:latest

    # Mount the current folder to /home/gllmuser inside the container
    volumes:
      # Per-project config — each folder has its own gllm.yaml, sessions, skills:
      - .:/home/gllmuser
      # Global config — all sessions, configs, and skills in one place:
      # - ~/.config/gllm:/home/gllmuser/.config/gllm
    
    # Enable modern color support
    environment:
      - TERM=xterm-256color
      - COLORTERM=truecolor
      # Proxy settings (if needed, adjust the proxy URL and port accordingly)
      #- HTTP_PROXY=http://host.docker.internal:7890
      #- HTTPS_PROXY=http://host.docker.internal:7890
      #- http_proxy=http://host.docker.internal:7890
      #- https_proxy=http://host.docker.internal:7890
    
    # For linux
    #network_mode: host
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"

    # Keep the terminal open for interactive commands
    stdin_open: true
    tty: true

  # gllm-web: Remote image, ttyd browser terminal on port 9000
  gllm-web:
    image: ghcr.io/activebook/gllm:latest
    volumes:
      # Per-project config
      - .:/home/gllmuser
    environment:
      - TERM=xterm-256color
      - COLORTERM=truecolor
    ports:
      - "9000:9000"
    entrypoint: ["/usr/bin/ttyd"]
    command: ["-W", "-p", "9000", "gllm"]

  # gllmd: Local build, CLI access
  gllmd:
    # Build using the Dockerfile in the current directory
    #build: .

    # Local image tag
    image: gllm:latest
    volumes:
      - .:/home/gllmuser
    environment:
      - TERM=xterm-256color
      - COLORTERM=truecolor
    stdin_open: true
    tty: true

  # gllmd-web: Local build, ttyd browser terminal on port 9001
  gllmd-web:
    image: gllm:latest
    # depends_on:
    #   - gllmd
    volumes:
      - .:/home/gllmuser
    environment:
      - TERM=xterm-256color
      - COLORTERM=truecolor
    ports:
      - "9001:9001"
    entrypoint: ["/usr/bin/ttyd"]
    command: ["-W", "-p", "9001", "gllm"]

    # How to run ttyd:
    # 1. Start the ttyd service: `docker compose run --rm --service-ports gllmd-web` (or gllm-web)
    # 2. Open your browser and navigate to http://localhost:9001 (or 9000)
    # Note: You must explicitly enable port mapping using --service-ports or by running as a daemon.
